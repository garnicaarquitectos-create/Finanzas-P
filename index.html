<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanzas</title>

<style>
:root{
 --bg:#070b10;
 --card:#111827;
 --accent:#8b5cf6;
 --text:#fff;
 --muted:#9ca3af;
}

body{
 margin:0;
 background:var(--bg);
 color:var(--text);
 font-family:-apple-system,sans-serif;
}

.header{
 padding:20px;
}

.saldo{
 font-size:32px;
 font-weight:700;
}

.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 padding:0 16px;
}

.card{
 background:var(--card);
 border-radius:16px;
 padding:14px;
}

.value{
 font-size:18px;
 margin-top:4px;
}

.section{
 padding:16px;
}

.mov{
 display:flex;
 justify-content:space-between;
 margin:8px 0;
}

.fab{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:65px;
 height:65px;
 border-radius:50%;
 background:var(--accent);
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:28px;
}

.modal{
 position:fixed;
 bottom:0;
 left:0;
 right:0;
 background:#0f172a;
 border-top-left-radius:20px;
 border-top-right-radius:20px;
 padding:20px;
 display:none;
}

input,select{
 width:100%;
 margin:6px 0;
 padding:10px;
 border-radius:10px;
 border:none;
 background:#1f2937;
 color:white;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:var(--accent);
 color:white;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<div>Disponible</div>
<div class="saldo" id="saldo"></div>
</div>

<div class="grid">

<div class="card">
<div>A pagar</div>
<div class="value" id="pagar"></div>
</div>

<div class="card">
<div>Tarjeta</div>
<div class="value" id="card"></div>
</div>

<div class="card">
<div>Ahorro</div>
<div class="value" id="saving"></div>
</div>

<div class="card">
<div>Mes</div>
<div class="value" id="month"></div>
</div>

</div>

<div class="section">
<div id="salaryPending"></div>

<div>Movimientos</div>
<div id="moves"></div>
</div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">

<select id="type">
<option value="main">Ingreso Principal</option>
<option value="extra">Ingreso adicional</option>
<option value="expense">Gasto</option>
</select>

<input id="concept" placeholder="Concepto">
<input id="amount" type="number" placeholder="Importe">

<select id="method">
<option>Efectivo</option>
<option>Débito</option>
<option>Tarjeta de crédito</option>
<option>Otro</option>
</select>

<button onclick="save()">Guardar</button>

</div>

<script>

let state={
 saldo:0,
 moves:[],
 savings:[],
 card:{limit:30000,openDebt:0,cutDebt:0},

 salary:{
  days:[15,30],
  pending:[]
 }
};

function money(n){
 return "$"+Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:2})
}

/* SUELDO PENDIENTE */
function processSalary(){

 let d=new Date();
 let today=d.getDate();
 let key=d.getFullYear()+"-"+d.getMonth()+"-"+today;

 if(state.salary.days.includes(today)){

  if(!state.salary.pending.includes(key)){
    state.salary.pending.push(key);
  }

 }

}

/* MODAL */
function openModal(){modal.style.display="block"}

function save(){

 let type=typeSelect.value;
 let amount=Number(amountInput.value);
 let concept=conceptInput.value;

 if(type==="main"){
  state.saldo+=amount;
  state.moves.unshift({concept:"Ingreso Principal",amount});

  // eliminar pendiente
  state.salary.pending.pop();
 }

 if(type==="extra"){
  state.saldo+=amount;
  state.moves.unshift({concept,amount});
 }

 if(type==="expense"){
  if(methodSelect.value==="Tarjeta de crédito"){
    state.card.openDebt+=amount;
  }else{
    state.saldo-=amount;
  }
  state.moves.unshift({concept,amount});
 }

 modal.style.display="none";
 render();
}

/* RENDER */
function render(){

 processSalary();

 let used=state.card.openDebt+state.card.cutDebt;
 let avail=state.card.limit-used;

 saldo.innerText=money(state.saldo);
 pagar.innerText=money(state.card.cutDebt);
 card.innerText=money(avail);
 saving.innerText=money(state.savings.reduce((t,s)=>t+s.amount,0));

 month.innerText=new Date().toLocaleDateString("es-MX",{month:"short"});

 salaryPending.innerHTML=state.salary.pending.length ?
 "💰 Ingreso Principal pendiente" : "";

 moves.innerHTML=state.moves.map(m=>`
 <div class="mov">
 <div>${m.concept}</div>
 <div>${money(m.amount)}</div>
 </div>`).join("");

}

/* INIT */
const typeSelect=document.getElementById("type");
const amountInput=document.getElementById("amount");
const conceptInput=document.getElementById("concept");
const methodSelect=document.getElementById("method");

render();

</script>

</body>
</html>
