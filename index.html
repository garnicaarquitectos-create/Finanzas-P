<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanzas v1.2</title>
<style>
body{background:#070b10;color:#fff;font-family:sans-serif;max-width:430px;margin:auto;padding:16px}
.card{background:#121922;border-radius:16px;padding:12px;margin-bottom:10px}
.big{font-size:28px;font-weight:bold}
button{background:#8b5cf6;color:#fff;border:none;padding:8px;border-radius:8px;margin-top:6px}
.row{display:flex;justify-content:space-between;margin:4px 0}
input,select{width:100%;margin:4px 0;padding:8px;border-radius:8px;border:none;background:#0f1622;color:#fff}
.modal{position:fixed;bottom:0;left:0;right:0;background:#0b1119;padding:12px;display:none}
</style>
</head>

<body>

<h3 id="month"></h3>

<div class="card">
<div>Disponible</div>
<div class="big" id="saldo"></div>
<button onclick="openModal('income')">+ Ingreso</button>
</div>

<div class="card">
<div>A pagar</div>
<div class="big" id="pagar"></div>
<button onclick="openDetail()">Ver detalle</button>
</div>

<div class="card">
<div>Tarjeta</div>
<div id="cardInfo"></div>
<button onclick="configCard()">Configurar</button>
</div>

<div class="card">
<div>Ahorro</div>
<div id="saving"></div>
<button onclick="addSaving()">Guardar</button>
<button onclick="withdrawSaving()">Retirar</button>
</div>

<div class="card">
<div>Movimientos</div>
<div id="moves"></div>
</div>

<button onclick="openModal('expense')">+ Gasto</button>

<div class="modal" id="modal"></div>

<div class="modal" id="detailModal">
<h3>Detalle mes</h3>
<div id="detail"></div>
</div>

<script>

const KEY="finanzas_v12";

let state={
 saldo:0,
 moves:[],
 savings:[],
 cards:[{name:"BBVA",limit:30000,openDebt:0,cutDebt:0,cutDay:25,lastCut:null}],
 msi:[],
 fixed:[],
 currentMonth:null
};

function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function load(){let r=localStorage.getItem(KEY); if(r)state=JSON.parse(r)}

function money(n){return "$"+Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:2})}

function monthKey(){
 let d=new Date();
 return d.getFullYear()+"-"+(d.getMonth()+1);
}

function processMonth(){
 let mk=monthKey();
 if(state.currentMonth===mk)return;
 state.currentMonth=mk;

 // corte
 let c=state.cards[0];
 c.cutDebt+=c.openDebt;
 c.openDebt=0;

 // MSI
 state.msi.forEach(m=>{
  if(m.remaining>0 && m.last!==mk){
   c.cutDebt+=m.monthly;
   m.remaining--;
   m.last=mk;
  }
 });

 save();
}

function totalPay(){
 let c=state.cards[0];
 let fixed=state.fixed.filter(f=>f.status==="pending")
 .reduce((t,f)=>t+f.amount,0);
 return c.cutDebt+fixed;
}

function openModal(type){

 let html="";

 if(type==="income"){
 html=`
 <h3>Ingreso</h3>
 <select id="cat">
 <option>Bono</option>
 <option>Ventas/Comisiones</option>
 <option>Impuestos</option>
 <option>PTU</option>
 <option>Reembolso</option>
 <option value="otro">Otro</option>
 </select>
 <input id="concept" placeholder="Concepto">
 <input id="amount" type="number" placeholder="Importe">
 <button onclick="saveIncome()">Guardar</button>
 `;
 }

 if(type==="expense"){
 html=`
 <h3>Gasto</h3>
 <select id="cat">
 <option>Supermercado</option>
 <option>Transporte</option>
 <option>Restaurante</option>
 <option>Ropa</option>
 <option>Otro</option>
 </select>
 <input id="concept" placeholder="Concepto">
 <input id="amount" type="number" placeholder="Importe">
 <select id="method">
 <option value="cash">Efectivo</option>
 <option value="card">Tarjeta</option>
 </select>
 <button onclick="saveExpense()">Guardar</button>
 `;
 }

 modal.innerHTML=html;
 modal.style.display="block";
}

function saveIncome(){
 let concept=concept.value||cat.value;
 let amount=Number(amount.value);
 if(!amount)return;
 state.saldo+=amount;
 state.moves.unshift({id:Date.now(),concept,amount,type:"income"});
 save();render();
}

function saveExpense(){
 let concept=concept.value||cat.value;
 let amount=Number(amount.value);
 let method=document.getElementById("method").value;
 if(!amount)return;

 if(method==="cash"){
  state.saldo-=amount;
 }else{
  state.cards[0].openDebt+=amount;
 }

 state.moves.unshift({id:Date.now(),concept,amount,type:"expense"});
 save();render();
}

function configCard(){
 let name=prompt("Nombre");
 let limit=Number(prompt("Línea"));
 let cut=Number(prompt("Día corte"));
 state.cards[0]={name,limit,openDebt:0,cutDebt:0,cutDay:cut};
 save();render();
}

function addSaving(){
 let a=Number(prompt("Cantidad"));
 if(!a)return;
 state.saldo-=a;
 state.savings.push({amount:a});
 save();render();
}

function withdrawSaving(){
 let a=Number(prompt("Cantidad"));
 if(!a)return;
 state.saldo+=a;
 state.savings.push({amount:-a});
 save();render();
}

function openDetail(){
 let c=state.cards[0];
 detail.innerHTML=`Tarjeta: ${money(c.cutDebt)}`;
 detailModal.style.display="block";
}

function render(){

 processMonth();

 let c=state.cards[0];
 let used=c.openDebt+c.cutDebt;
 let avail=c.limit-used;

 month.innerText=new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"});
 saldo.innerText=money(state.saldo);
 pagar.innerText=money(totalPay());

 cardInfo.innerHTML=`
 <div class="row"><div>Usado</div><div>${money(used)}</div></div>
 <div class="row"><div>Disponible</div><div>${money(avail)}</div></div>
 `;

 saving.innerText=money(state.savings.reduce((t,s)=>t+s.amount,0));

 moves.innerHTML=state.moves.map(m=>`
 <div class="row">
 <div>${m.concept}</div>
 <div>${money(m.amount)}</div>
 </div>`).join("");
}

load();
render();

</script>
</body>
</html>
