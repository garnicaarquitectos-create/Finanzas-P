<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanzas</title>

<style>
body{
 background:#070b10;
 color:white;
 font-family:sans-serif;
 max-width:430px;
 margin:auto;
 padding:16px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.card{
 background:linear-gradient(135deg,#1a2230,#0f1622);
 border-radius:16px;
 padding:12px;
}

.big{font-size:22px;font-weight:bold}

button{
 background:linear-gradient(135deg,#8b5cf6,#5b21b6);
 border:none;
 color:white;
 padding:10px;
 border-radius:10px;
 width:100%;
 margin-top:6px;
}

.row{
 display:flex;
 justify-content:space-between;
 margin:6px 0;
}

/* FAB */
.fab{
 position:fixed;
 bottom:20px;
 right:20px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:#8b5cf6;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:28px;
}

/* MODAL */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.8);
 display:none;
 align-items:center;
 justify-content:center;
}

.box{
 background:#0f1622;
 padding:16px;
 border-radius:16px;
 width:90%;
}

input,select{
 width:100%;
 margin:6px 0;
 padding:10px;
 border-radius:10px;
 border:none;
 background:#1a2230;
 color:white;
}
</style>
</head>

<body>

<h3 id="month"></h3>

<div class="grid">

<div class="card">
<div>Disponible</div>
<div class="big" id="saldo"></div>
</div>

<div class="card">
<div>A pagar</div>
<div class="big" id="pagar"></div>
</div>

<div class="card">
<div>Tarjeta</div>
<div id="cardInfo"></div>
</div>

<div class="card">
<div>Ahorro</div>
<div id="saving"></div>
</div>

</div>

<div class="card">
<div>Movimientos</div>
<div id="moves"></div>
</div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
<div class="box">
<h3>Movimiento</h3>

<select id="type">
<option value="income">Ingreso</option>
<option value="expense">Gasto</option>
</select>

<input id="concept" placeholder="Concepto">
<input id="amount" type="number" placeholder="Importe">

<select id="method">
<option value="cash">Efectivo</option>
<option value="card">Tarjeta</option>
</select>

<button onclick="save()">Guardar</button>
</div>
</div>

<script>

let state={
 saldo:0,
 moves:[],
 savings:[],
 card:{limit:30000,openDebt:0,cutDebt:0},

 // NUEVO
 salary:{
  amount:10000,
  days:[15,30],
  lastApplied:[]
 }
};

function money(n){
 return "$"+Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:2})
}

/* INGRESO QUINCENAL */
function processSalary(){

 let today=new Date();
 let day=today.getDate();

 state.salary.days.forEach(d=>{

  let key=today.getFullYear()+"-"+today.getMonth()+"-"+d;

  if(day===d && !state.salary.lastApplied.includes(key)){

    state.saldo+=state.salary.amount;

    state.moves.unshift({
      concept:"Sueldo",
      amount:state.salary.amount
    });

    state.salary.lastApplied.push(key);
  }

 });

}

/* MODAL */
function openModal(){modal.style.display="flex"}
function save(){

 let type=document.getElementById("type").value;
 let concept=document.getElementById("concept").value;
 let amount=Number(document.getElementById("amount").value);
 let method=document.getElementById("method").value;

 if(type==="income"){
  state.saldo+=amount;
 }

 if(type==="expense"){
  if(method==="cash") state.saldo-=amount;
  else state.card.openDebt+=amount;
 }

 state.moves.unshift({concept,amount});
 modal.style.display="none";

 render();
}

/* RENDER */
function render(){

 processSalary();

 saldo.innerText=money(state.saldo);
 pagar.innerText=money(state.card.cutDebt);

 let used=state.card.openDebt+state.card.cutDebt;
 let avail=state.card.limit-used;

 cardInfo.innerHTML=`
 <div class="row"><div>Usado</div><div>${money(used)}</div></div>
 <div class="row"><div>Disponible</div><div>${money(avail)}</div></div>
 `;

 saving.innerText=money(state.savings.reduce((t,s)=>t+s.amount,0));

 moves.innerHTML=state.moves.map(m=>`
 <div class="row">
 <div>${m.concept}</div>
 <div>${money(m.amount)}</div>
 </div>`).join("");

 month.innerText=new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"});
}

render();

</script>

</body>
</html>
