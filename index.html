<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mis Finanzas</title>

<style>
:root{
 --bg:#0b0f14; --card:#121821; --text:#eef2f7; --muted:#94a3b8;
 --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --purple:#8b5cf6;
}
*{box-sizing:border-box}
body{
 background:linear-gradient(180deg,#0b0f14,#0e1420);
 color:var(--text);
 font-family:sans-serif;
 max-width:430px;margin:auto;padding:18px;
}
.header{text-align:center;margin-bottom:16px}
.header h1{margin:0;font-size:24px;font-weight:900}
.header p{margin:6px 0 0;color:var(--muted)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#121821;padding:14px;border-radius:18px;margin-bottom:10px}
.hero{grid-column:span 2}
.redbg{background:#2a0f12}
.greenbg{background:#0f2a1c}

.label{font-size:11px;color:#cbd5e1}
.big{font-size:28px;font-weight:900;margin-top:6px}

.row{display:flex;justify-content:space-between;margin:8px 0}

button{
 background:#1f2937;color:white;border:none;padding:6px 10px;border-radius:8px
}

.green{color:var(--green)}
.red{color:var(--red)}
.amber{color:var(--amber)}
</style>
</head>

<body>

<div class="header">
<h1 id="greeting"></h1>
<p id="month"></p>
</div>

<div class="grid">
<div class="card hero">
<div class="label">Saldo</div>
<div class="big" id="saldo"></div>
</div>

<div class="card redbg">
<div class="label">A pagar</div>
<div class="big" id="pagar"></div>
</div>

<div class="card greenbg">
<div class="label">Disponible</div>
<div class="big" id="disp"></div>
</div>
</div>

<div class="card">
<h3>Ahorro</h3>
<div id="savingTotal"></div>
<div id="savingList"></div>
<button onclick="addSaving()">+ Ahorrar</button>
<button onclick="withdrawSaving()">Retirar</button>
</div>

<div class="card">
<h3>Movimientos</h3>
<button onclick="openMove()">+ Nuevo</button>
<div id="moves"></div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none">
<select id="mConceptSelect" onchange="applyConceptSelection()">
<option value="">Selecciona</option>
<option>Uber/Transporte</option>
<option>Restaurante</option>
<option>Súper</option>
<option>Vacaciones</option>
<option>Farmacia</option>
<option>Emergencia</option>
<option>Ropa</option>
<option>Deporte/Gym</option>
<option>Préstamo</option>
<option>Tarjeta de Crédito</option>
<option>Ocio</option>
<option value="otro">Otro</option>
</select>

<input id="mConcept" placeholder="Concepto">
<input id="mAmount" type="number">
<button onclick="saveMove()">Guardar</button>
</div>

<script>
const KEY="finanzas_final_full";

let state={
baseSaldo:10000,
moves:[],
savings:[]
};

function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function load(){
const raw=localStorage.getItem(KEY);
if(raw) state=JSON.parse(raw);
}

function money(n){return "$"+Number(n).toFixed(2)}

function saldo(){
let s=state.baseSaldo;
state.moves.forEach(m=>{
if(m.type==="expense") s-=m.amount;
});
return s;
}

function totalSaving(){
return state.savings.reduce((t,s)=>t+s.amount,0);
}

// ===== CONCEPTOS =====
function applyConceptSelection(){
const sel=document.getElementById('mConceptSelect').value;

if(sel==="otro"){
document.getElementById('mConcept').value="";
}else{
document.getElementById('mConcept').value=sel;
}
}

// ===== AHORRO =====
function addSaving(){
const name=prompt("Nombre del ahorro");
const amount=Number(prompt("Cantidad"));

if(!amount) return;

state.baseSaldo-=amount;

let box=state.savings.find(s=>s.name===name);
if(box){box.amount+=amount}
else{state.savings.push({name,amount})}

save();render();
}

function withdrawSaving(){
const name=prompt("¿De cuál ahorro?");
const amount=Number(prompt("Cantidad"));

let box=state.savings.find(s=>s.name===name);
if(!box || box.amount<amount) return;

box.amount-=amount;
state.baseSaldo+=amount;

save();render();
}

// ===== MOVES =====
function openMove(){
document.getElementById("modal").style.display="block";
}

function saveMove(){
const concept=document.getElementById("mConcept").value;
const amount=Number(document.getElementById("mAmount").value);

state.moves.push({id:Date.now(),concept,amount,type:"expense"});

save();render();
}

// ===== RENDER =====
function render(){

document.getElementById("month").innerText=new Date().toLocaleDateString('es-MX',{month:'long',year:'numeric'});
document.getElementById("greeting").innerText="Hola Karen 👋";

document.getElementById("saldo").innerHTML=money(saldo());
document.getElementById("savingTotal").innerHTML=money(totalSaving());

document.getElementById("moves").innerHTML=
state.moves.map(m=>`
<div class="row">
<div>${m.concept}</div>
<div>${money(m.amount)}</div>
</div>
`).join("");

document.getElementById("savingList").innerHTML=
state.savings.map(s=>`
<div class="row">
<div>${s.name}</div>
<div>${money(s.amount)}</div>
</div>
`).join("");

save();
}

load();
render();
</script>

</body>
</html>
