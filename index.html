<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mis Finanzas</title>

<style>
:root{
 --bg:#0b0f14;
 --card:#121821;
 --text:#eef2f7;
 --muted:#94a3b8;
 --green:#22c55e;
 --red:#ef4444;
 --amber:#f59e0b;
 --purple:#8b5cf6;
}

body{
 background:linear-gradient(180deg,#0b0f14,#0e1420);
 color:var(--text);
 font-family:sans-serif;
 max-width:420px;
 margin:auto;
 padding:18px;
}

.header{text-align:center;margin-bottom:16px}
.header h1{margin:0;font-size:24px;font-weight:900}
.header p{margin:6px 0 0;color:var(--muted)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.card{
 background:#121821;
 padding:14px;
 border-radius:18px;
 margin-bottom:10px;
}

.hero{grid-column:span 2}
.redbg{background:#2a0f12}
.greenbg{background:#0f2a1c}

.label{font-size:11px;color:#cbd5e1}
.big{font-size:28px;font-weight:900;margin-top:6px}

.row{display:flex;justify-content:space-between;margin:8px 0}

button{
 background:#1f2937;
 color:white;
 border:none;
 padding:6px 10px;
 border-radius:8px;
}

.green{color:var(--green)}
.red{color:var(--red)}
.amber{color:var(--amber)}
</style>
</head>

<body>

<div class="header">
<h1 id="greeting"></h1>
<p id="month"></p>
</div>

<div class="grid">
<div class="card hero">
<div class="label">Saldo</div>
<div class="big" id="saldo"></div>
</div>

<div class="card redbg">
<div class="label">A pagar</div>
<div class="big" id="pagar"></div>
</div>

<div class="card greenbg">
<div class="label">Disponible</div>
<div class="big" id="disp"></div>
</div>
</div>

<div class="card">
<h3>Movimientos</h3>
<div id="moves"></div>
</div>

<div class="card">
<h3>Historial mensual</h3>
<div id="history"></div>
</div>

<script>

const KEY="finanzas_final";

let state={
baseSaldo:10000,
moves:[],
cards:[],
installments:[]
};

function load(){
const raw=localStorage.getItem(KEY);
if(raw) state=JSON.parse(raw);
}

function save(){
localStorage.setItem(KEY,JSON.stringify(state));
}

function period(){
const d=new Date();
return d.getFullYear()+"-"+(d.getMonth()+1);
}

function money(n){
return "$"+Number(n).toFixed(2);
}

function moneyNoDecimals(n){
return "$"+Math.round(n);
}

function signed(n,noDec=false){
if(n===0)return "<span class='amber'>0</span>";
let val=noDec?moneyNoDecimals(Math.abs(n)):money(Math.abs(n));
return `<span class='${n>0?"green":"red"}'>${n>0?"+":"-"} ${val}</span>`;
}

function saldo(){
let s=state.baseSaldo;
state.moves.forEach(m=>{
if(m.type==="income") s+=m.amount;
if(m.type==="expense") s-=m.amount;
});
return s;
}

function totalPay(){
return state.cards.reduce((t,c)=>t+(c.cutDebt||0),0);
}

function available(){
return saldo()-totalPay();
}

// MSI
function processMSI(){
const cur=period();

state.installments.forEach(i=>{
if(i.last===cur)return;

const card=state.cards.find(c=>c.id===i.cardId);
if(!card)return;

if(i.left>0){
card.openDebt+=i.monthly;
i.left--;
}

i.last=cur;
});

state.installments=state.installments.filter(i=>i.left>0);
}

// CORTE
function processCut(){
const today=new Date();

state.cards.forEach(c=>{
const cut=new Date(today.getFullYear(),today.getMonth(),c.cut);

if(today.getDate()<c.cut) cut.setMonth(cut.getMonth()-1);

const key=period();
if(c.last===key)return;

c.cutDebt=c.openDebt;
c.openDebt=0;
c.last=key;
});
}

// EDIT
function editMove(id){
const m=state.moves.find(x=>x.id===id);
const val=prompt("Nuevo importe",m.amount);
if(val!==null){
m.amount=Number(val);
save();render();
}
}

function deleteMove(id){
if(confirm("Eliminar?")){
state.moves=state.moves.filter(m=>m.id!==id);
save();render();
}
}

// HISTORIAL
function history(){
let map={};

state.moves.forEach(m=>{
let p=period();
if(!map[p]) map[p]=0;
if(m.type==="expense") map[p]+=m.amount;
});

return Object.keys(map).map(k=>`
<div class="row">
<div>${k}</div>
<div>${money(map[k])}</div>
</div>
`).join("");
}

// RENDER
function render(){

processMSI();
processCut();

document.getElementById("month").innerText=
new Date().toLocaleDateString('es-MX',{month:'long',year:'numeric'});

document.getElementById("greeting").innerText="Hola Karen 👋";

document.getElementById("saldo").innerHTML=signed(saldo());
document.getElementById("pagar").innerHTML=signed(totalPay(),true);
document.getElementById("disp").innerHTML=signed(available(),true);

document.getElementById("moves").innerHTML=
state.moves.map(m=>`
<div class="row">
<div>${m.concept}</div>
<div>${money(m.amount)}</div>
<div>
<button onclick="editMove(${m.id})">✏️</button>
<button onclick="deleteMove(${m.id})">🗑</button>
</div>
</div>
`).join("");

document.getElementById("history").innerHTML=history();

save();
}

// DEMO
function seed(){
state.moves.push({id:1,type:"expense",amount:2000,concept:"Renta"});
state.cards.push({id:1,openDebt:0,cutDebt:0,cut:25});
state.installments.push({id:1,cardId:1,monthly:1000,left:6,last:null});
}

load();
if(state.moves.length===0) seed();
render();

</script>

</body>
</html>
