<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanzas</title>

<style>
body{
 background:linear-gradient(180deg,#070b10,#0b1017);
 color:white;
 font-family:sans-serif;
 max-width:420px;
 margin:auto;
 padding:16px;
}

.card{
 background:rgba(255,255,255,0.05);
 border-radius:16px;
 padding:14px;
 margin-bottom:12px;
}

.big{font-size:30px;font-weight:bold}

button{
 background:linear-gradient(135deg,#8b5cf6,#5b21b6);
 border:none;
 color:white;
 padding:10px;
 border-radius:10px;
 margin-top:6px;
 width:100%;
}

.row{
 display:flex;
 justify-content:space-between;
 margin:6px 0;
}

.modal{
 position:fixed;
 top:0;
 left:0;
 right:0;
 bottom:0;
 background:rgba(0,0,0,0.9);
 display:none;
 flex-direction:column;
 padding:20px;
}

.modalContent{
 background:#0f1622;
 padding:16px;
 border-radius:16px;
}

input,select{
 width:100%;
 margin:6px 0;
 padding:10px;
 border-radius:10px;
 border:none;
 background:#0f1622;
 color:white;
}

.close{
 text-align:right;
 font-size:20px;
 cursor:pointer;
}
</style>
</head>

<body>

<h3 id="month"></h3>

<div class="card">
<div>Disponible</div>
<div class="big" id="saldo"></div>
<button onclick="openModal('income')">+ Ingreso</button>
</div>

<div class="card">
<div>A pagar</div>
<div class="big" id="pagar"></div>
<button onclick="openDetail()">Ver detalle</button>
</div>

<div class="card">
<div>Tarjeta</div>
<div id="cardInfo"></div>
<button onclick="configCard()">Configurar tarjeta</button>
</div>

<div class="card">
<div>Movimientos</div>
<div id="moves"></div>
</div>

<button onclick="openModal('expense')">+ Gasto</button>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent">
<div class="close" onclick="closeModal()">✕</div>
<div id="modalBody"></div>
</div>
</div>

<script>

let state={
 saldo:0,
 moves:[],
 cards:[{name:"BBVA",limit:30000,openDebt:0,cutDebt:0}]
};

function money(n){
 return "$"+Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:2})
}

function openModal(type){

 let html="";

 if(type==="income"){
 html=`
 <h3>Ingreso</h3>
 <select id="cat">
 <option>Bono</option>
 <option>Ventas/Comisiones</option>
 <option>Impuestos</option>
 <option>PTU</option>
 <option>Reembolso</option>
 <option>Otro</option>
 </select>
 <input id="concept" placeholder="Concepto">
 <input id="amount" type="number" placeholder="Importe">
 <button onclick="saveIncome()">Guardar</button>
 `;
 }

 if(type==="expense"){
 html=`
 <h3>Gasto</h3>
 <select id="cat">
 <option>Supermercado</option>
 <option>Transporte</option>
 <option>Restaurante</option>
 <option>Ropa</option>
 <option>Otro</option>
 </select>
 <input id="concept" placeholder="Concepto">
 <input id="amount" type="number" placeholder="Importe">
 <select id="method">
 <option value="cash">Efectivo</option>
 <option value="card">Tarjeta</option>
 </select>
 <button onclick="saveExpense()">Guardar</button>
 `;
 }

 modalBody.innerHTML=html;
 modal.style.display="flex";
}

function closeModal(){
 modal.style.display="none";
}

function saveIncome(){
 let concept=document.getElementById("concept").value||document.getElementById("cat").value;
 let amount=Number(document.getElementById("amount").value);

 if(!amount)return;

 state.saldo+=amount;
 state.moves.unshift({concept,amount});
 closeModal();
 render();
}

function saveExpense(){
 let concept=document.getElementById("concept").value||document.getElementById("cat").value;
 let amount=Number(document.getElementById("amount").value);
 let method=document.getElementById("method").value;

 if(!amount)return;

 if(method==="cash"){
  state.saldo-=amount;
 }else{
  state.cards[0].openDebt+=amount;
 }

 state.moves.unshift({concept,amount});
 closeModal();
 render();
}

function configCard(){
 let name=prompt("Nombre tarjeta");
 let limit=Number(prompt("Línea crédito"));

 state.cards[0]={name,limit,openDebt:0,cutDebt:0};
 render();
}

function render(){

 let c=state.cards[0];
 let used=c.openDebt+c.cutDebt;
 let avail=c.limit-used;

 document.getElementById("month").innerText=
 new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"});

 document.getElementById("saldo").innerText=money(state.saldo);

 document.getElementById("pagar").innerText=money(c.cutDebt);

 document.getElementById("cardInfo").innerHTML=`
 <div class="row"><div>Usado</div><div>${money(used)}</div></div>
 <div class="row"><div>Disponible</div><div>${money(avail)}</div></div>
 `;

 document.getElementById("moves").innerHTML=
 state.moves.map(m=>`
 <div class="row">
 <div>${m.concept}</div>
 <div>${money(m.amount)}</div>
 </div>`).join("");
}

render();

</script>

</body>
</html>
