<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mis Finanzas</title>

<style>
:root{
 --bg:#070b10;
 --card:#121922;
 --text:#f7f8fb;
 --muted:#8d99aa;
 --purple:#8b5cf6;
 --purpleDark:#5b21b6;
 --green:#22c55e;
 --red:#ef4444;
}

body{
 background:linear-gradient(180deg,#070b10,#0b1017);
 color:var(--text);
 font-family:sans-serif;
 max-width:430px;
 margin:auto;
 padding:18px;
}

.card{
 background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
 border-radius:18px;
 padding:14px;
 margin-bottom:12px;
}

.big{font-size:28px;font-weight:900}

button{
 background:linear-gradient(135deg,var(--purple),var(--purpleDark));
 border:none;
 padding:8px;
 border-radius:10px;
 color:white;
 margin-top:6px;
}

.row{display:flex;justify-content:space-between;margin:6px 0}
</style>
</head>

<body>

<h2 id="month"></h2>

<div class="card">
<div>Saldo</div>
<div class="big" id="saldo"></div>
</div>

<div class="card">
<div>A pagar</div>
<div class="big" id="pagar"></div>
</div>

<div class="card">
<div>Disponible</div>
<div class="big" id="disp"></div>
</div>

<div class="card">
<h3>Ahorro</h3>
<div id="savingTotal"></div>
<div id="savingList"></div>
<button onclick="addSaving()">+ Ahorrar</button>
<button onclick="withdrawSaving()">Retirar</button>
</div>

<div class="card">
<h3>Tarjetas</h3>
<div id="cards"></div>
<button onclick="addCard()">+ Tarjeta</button>
</div>

<div class="card">
<h3>Movimientos</h3>
<button onclick="openModal()">+ Nuevo</button>
<div id="moves"></div>
</div>

<div id="modal" style="display:none">

<select id="mConceptSelect" onchange="applyConceptSelection()">
<option value="">Selecciona</option>
<option>Uber/Transporte</option>
<option>Restaurante</option>
<option>Súper</option>
<option>Vacaciones</option>
<option>Farmacia</option>
<option>Emergencia</option>
<option>Ropa</option>
<option>Deporte/Gym</option>
<option>Préstamo</option>
<option>Tarjeta de Crédito</option>
<option>Ocio</option>
<option value="otro">Otro</option>
</select>

<input id="mConcept" placeholder="Concepto">
<input id="mAmount" type="number">

<select id="mMethod">
<option value="cash">Débito/Efectivo</option>
<option value="card">Tarjeta</option>
</select>

<select id="mCard"></select>

<button onclick="saveMove()">Guardar</button>

</div>

<script>
const KEY="finanzas_estable";

let state={
 baseSaldo:10000,
 moves:[],
 savings:[],
 cards:[]
};

function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function load(){let r=localStorage.getItem(KEY); if(r) state=JSON.parse(r)}

function money(n){return "$"+Number(n).toFixed(2)}

function applyConceptSelection(){
 let sel=document.getElementById("mConceptSelect").value;
 if(sel==="otro") document.getElementById("mConcept").value="";
 else document.getElementById("mConcept").value=sel;
}

/* AHORRO */
function totalSaving(){return state.savings.reduce((t,s)=>t+s.amount,0)}

function addSaving(){
 let name=prompt("Nombre ahorro");
 let amount=Number(prompt("Cantidad"));
 if(!amount) return;
 state.baseSaldo-=amount;
 let box=state.savings.find(s=>s.name===name);
 if(box) box.amount+=amount;
 else state.savings.push({name,amount});
 save();render();
}

function withdrawSaving(){
 let name=prompt("¿De cuál?");
 let amount=Number(prompt("Cantidad"));
 let box=state.savings.find(s=>s.name===name);
 if(!box||box.amount<amount)return;
 box.amount-=amount;
 state.baseSaldo+=amount;
 save();render();
}

/* TARJETAS */
function addCard(){
 let name=prompt("Nombre tarjeta");
 let cut=Number(prompt("Día corte"))||25;
 state.cards.push({id:Date.now(),name,cut,openDebt:0,cutDebt:0,lastCut:null});
 save();render();
}

function processCut(){
 let today=new Date();
 state.cards.forEach(c=>{
  let cutDate=new Date(today.getFullYear(),today.getMonth(),c.cut);
  if(today.getDate()<c.cut) cutDate.setMonth(cutDate.getMonth()-1);
  let key=cutDate.toISOString().slice(0,7);
  if(c.lastCut===key) return;
  c.cutDebt+=c.openDebt;
  c.openDebt=0;
  c.lastCut=key;
 });
}

function applyCardPayment(amount){
 let remaining=amount;
 state.cards.forEach(c=>{
  let pay=Math.min(c.cutDebt,remaining);
  c.cutDebt-=pay;
  remaining-=pay;
 });
 state.cards.forEach(c=>{
  let pay=Math.min(c.openDebt,remaining);
  c.openDebt-=pay;
  remaining-=pay;
 });
}

/* MOVES */
function openModal(){
 document.getElementById("modal").style.display="block";
 document.getElementById("mCard").innerHTML=
 state.cards.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
}

function saveMove(){
 let concept=document.getElementById("mConcept").value;
 let amount=Number(document.getElementById("mAmount").value);
 let method=document.getElementById("mMethod").value;
 let cardId=Number(document.getElementById("mCard").value);

 if(!amount) return;

 if(method==="card"){
  let card=state.cards.find(c=>c.id===cardId);
  if(card) card.openDebt+=amount;
 }else{
  state.baseSaldo-=amount;
 }

 if(concept.toLowerCase().includes("tarjeta")){
  applyCardPayment(amount);
 }

 state.moves.push({concept,amount});

 save();render();
}

/* CALCULOS */
function totalPay(){return state.cards.reduce((t,c)=>t+c.cutDebt,0)}
function available(){return state.baseSaldo-totalPay()}

/* RENDER */
function render(){

 processCut();

 document.getElementById("month").innerText=
 new Date().toLocaleDateString('es-MX',{month:'long',year:'numeric'});

 document.getElementById("saldo").innerText=money(state.baseSaldo);
 document.getElementById("pagar").innerText=money(totalPay());
 document.getElementById("disp").innerText=money(available());

 document.getElementById("savingTotal").innerText=money(totalSaving());

 document.getElementById("savingList").innerHTML=
 state.savings.map(s=>`<div class="row"><div>${s.name}</div><div>${money(s.amount)}</div></div>`).join("");

 document.getElementById("cards").innerHTML=
 state.cards.map(c=>`<div class="row"><div>${c.name}</div><div>${money(c.cutDebt)}</div></div>`).join("");

 document.getElementById("moves").innerHTML=
 state.moves.map(m=>`<div class="row"><div>${m.concept}</div><div>${money(m.amount)}</div></div>`).join("");
}

load();
render();
</script>

</body>
</html>
